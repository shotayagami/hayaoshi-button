<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早押しボタン - 管理画面</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: var(--color-bg-elevated); color: var(--color-text); }
        .link-wifi { font-size: 0.5em; color: var(--color-info); }

        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--color-surface); padding: 8px 16px; border-radius: var(--radius-md); margin-bottom: 16px;
        }
        .status-indicator { padding: 4px 12px; border-radius: var(--radius-sm); font-weight: bold; font-size: 0.9em; }
        .status-idle { background: var(--color-text-subtle); }
        .status-armed { background: var(--color-correct); }
        .status-judging { background: var(--color-warning); color: #222; }
        .status-showing_result { background: #264653; }
        .ws-status { font-size: 0.8em; }
        .ws-connected { color: var(--color-correct); }
        .ws-disconnected { color: var(--color-incorrect); }

        .audio-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .audio-title { font-size: 0.8em; color: var(--color-text-dim); }
        .audio-label { font-size: 0.75em; cursor: pointer; display: flex; align-items: center; gap: 2px; }
        .audio-status { font-size: 0.75em; cursor: pointer; }

        .hidden { display: none; }
        .correct-remaining {
            margin-left: 12px; padding: 3px 10px; border-radius: 4px;
            background: var(--color-purple); color: var(--color-text-on-accent); font-size: 0.85em; font-weight: bold;
        }

        .controls {
            display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center;
        }
        .controls-judge { margin-top: 4px; }
        .controls button {
            padding: 12px 24px; border: none; border-radius: var(--radius-md); font-size: 1em;
            cursor: pointer; font-weight: bold; color: var(--color-text-on-accent);
        }
        .btn-arm { background: var(--color-correct); }
        .btn-jingle { background: var(--color-purple); }
        .btn-countdown { background: #d4a017; color: #222; }
        .btn-stop { background: #c9184a; }
        .btn-reset { background: var(--color-neutral); }
        .btn-correct { background: #2196F3; }
        .btn-incorrect { background: var(--color-incorrect); }
        .controls button:disabled { opacity: 0.4; cursor: not-allowed; }

        .players-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
        .players-table th { background: var(--color-surface); padding: 8px; text-align: left; font-size: 0.85em; }
        .players-table td { padding: 6px 8px; border-bottom: 1px solid var(--color-border); }
        .players-table .player-num {
            width: 30px; height: 30px; border-radius: 50%; display: inline-flex;
            align-items: center; justify-content: center; font-weight: bold; color: #fff; font-size: 0.85em;
        }
        .players-table input[type="text"] {
            background: var(--color-surface); border: 1px solid var(--color-border-strong); color: var(--color-text); padding: 4px 8px;
            border-radius: var(--radius-sm); width: 120px; font-size: 0.9em;
        }
        .score-controls { display: flex; align-items: center; gap: 4px; }
        .score-controls button {
            width: 28px; height: 28px; border: none; border-radius: var(--radius-sm);
            cursor: pointer; font-weight: bold; font-size: 1em; color: #fff;
        }
        .score-controls .btn-plus { background: var(--color-correct); }
        .score-controls .btn-minus { background: var(--color-incorrect); }
        .score-value { min-width: 40px; text-align: center; font-weight: bold; font-size: 1.1em; }
        .player-pressed { background: rgba(45, 106, 79, 0.3) !important; }
        .player-first { background: rgba(33, 150, 243, 0.3) !important; }

        .press-order {
            background: var(--color-surface); padding: 12px; border-radius: var(--radius-md); margin-bottom: 16px;
        }
        .press-order h3 { margin: 0 0 8px; font-size: 1em; }
        .press-list { display: flex; gap: 8px; flex-wrap: wrap; min-height: 36px; align-items: center; }
        .press-item {
            padding: 4px 12px; border-radius: 4px; font-weight: bold; font-size: 0.9em;
        }
        .press-first { background: #2196F3; color: #fff; font-size: 1.1em; }
        .press-other { background: var(--color-border-strong); color: #ccc; }
        .press-empty { color: var(--color-text-subtle); font-style: italic; }

        .settings {
            background: var(--color-surface); padding: 12px; border-radius: var(--radius-md);
        }
        .settings-space { margin-top: 12px; }
        .settings h3 { margin: 0 0 8px; font-size: 1em; }
        .settings-grid { display: grid; grid-template-columns: auto 1fr; gap: 8px; align-items: center; }
        .settings-grid label { font-size: 0.85em; }
        .settings-grid input {
            background: var(--color-bg-elevated); border: 1px solid var(--color-border-strong); color: var(--color-text); padding: 4px 8px;
            border-radius: var(--radius-sm); width: 80px; font-size: 0.9em;
        }

        .options-list { display: flex; flex-direction: column; gap: 6px; }
        .option-label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .option-check { width: 18px; height: 18px; cursor: pointer; }
        .option-check-sm { width: 16px; height: 16px; cursor: pointer; }
        .max-accepts-input { width: 60px; padding: 4px; font-size: 14px; }
        .hint-text { color: #999; font-size: 12px; }
        .penalty-select { background: var(--color-bg-elevated); color: var(--color-text); border: 1px solid var(--color-border-strong); border-radius: var(--radius-sm); padding: 2px 4px; }
        .batch-settings { margin-left: 24px; margin-top: 4px; }
        .batch-order-settings { margin-left: 22px; margin-top: 2px; }
        .batch-label { font-size: 0.85em; }
        .batch-label-dim { font-size: 0.85em; color: var(--color-text-dim); }
        .batch-points-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
        .batch-rank { display: inline-flex; align-items: center; gap: 3px; }
        .batch-rank-label { font-size: 0.8em; color: var(--color-text-dim); }
        .batch-rank-input { width: 44px; padding: 2px 4px; border-radius: var(--radius-sm); border: 1px solid var(--color-border-strong); background: var(--color-bg-elevated); color: var(--color-text); font-size: 0.85em; text-align: center; }
        .batch-extra-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 6px; }
        .batch-judge-cell { display: flex; gap: 6px; justify-content: center; align-items: center; }
        .batch-judge-label { display: inline-flex; align-items: center; gap: 2px; font-size: 0.8em; color: var(--color-text-dim); cursor: pointer; }
        .batch-judge-check { width: 18px; height: 18px; cursor: pointer; }

        .history-scroll { overflow-x: auto; }
        .history-table { width: 100%; border-collapse: collapse; font-size: 0.8em; }
        .history-table th, .history-table td {
            padding: 4px 6px; border: 1px solid var(--color-border); text-align: center; white-space: nowrap;
        }
        .history-table th { background: var(--color-surface); font-weight: bold; }
        .history-table td { background: var(--color-bg-elevated); }
        .history-table .h-correct { color: var(--color-correct); font-weight: bold; }
        .history-table .h-incorrect { color: var(--color-incorrect); }
        .history-table .h-penalty { color: var(--color-text-subtle); font-style: italic; }
        .history-table .h-round { background: var(--color-surface); font-weight: bold; color: var(--color-text-dim); }

        .sound-file-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .btn-sound { padding: 4px 12px; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85em; }
        .btn-sound-select { background: #444; color: #eee; }
        .btn-sound-upload { background: #2d6a4f; }
        .sound-file-name { font-size: 0.85em; color: var(--color-text-dim); }
        .sound-upload-status { font-size: 0.8em; color: var(--color-text-dim); }

        .reset-dialog {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center;
        }
        .reset-dialog.show { display: flex; }
        .reset-dialog-body { background: #16213e; border-radius: 12px; padding: 24px; max-width: 360px; width: 90%; }
        .reset-dialog-body h3 { margin: 0 0 16px; text-align: center; }
        .reset-dialog-list { display: flex; flex-direction: column; gap: 10px; }
        .reset-btn { padding: 12px; border: none; border-radius: 8px; font-size: 1em; cursor: pointer; color: #fff; }
        .reset-btn-idle { background: var(--color-neutral); }
        .reset-btn-penalty { background: #f4a261; color: #222; }
        .reset-btn-score { background: var(--color-incorrect); }
        .reset-btn-all { background: #c9184a; }
        .reset-btn-cancel { padding: 10px; background: #333; color: #888; border: none; border-radius: 8px; font-size: 0.9em; cursor: pointer; margin-top: 4px; }

        .round-control {
            background: #457b9d; border-radius: 8px; padding: 12px;
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
        }
        .round-control-label { font-size: 0.95em; font-weight: bold; color: #fff; }
        .round-control-group { display: flex; align-items: center; gap: 6px; }
        .round-control-btn {
            width: 36px; height: 36px; border: none; border-radius: 6px;
            background: #1a1a2e; color: #fff; font-size: 1.2em; font-weight: bold; cursor: pointer;
        }
        .round-control-input {
            width: 50px; text-align: center; padding: 6px; border: none; border-radius: 6px;
            background: #1a1a2e; color: #fff; font-size: 1.1em; font-weight: bold;
        }
    </style>
</head>
<body class="page-shell">
    <h1 class="page-title">早押しボタン 管理画面 <a href="/setup" class="link-wifi">Wi-Fi設定</a></h1>

    <div class="status-bar">
        <div>
            状態: <span id="gameState" class="status-indicator status-idle">IDLE</span>
            <span>問題: <span id="roundNum">0</span>問目</span>
            <span id="correctRemaining" class="correct-remaining hidden">正解残り: <span id="correctRemainingValue">0</span></span>
        </div>
        <div class="audio-controls">
            <span class="audio-title">音声:</span>
            <label class="audio-label">
                <input type="checkbox" id="audioAdmin" onchange="onAudioModeChange()" checked> 管理画面
            </label>
            <label class="audio-label">
                <input type="checkbox" id="audioDisplay" onchange="onAudioModeChange()"> 表示画面
            </label>
            <label class="audio-label">
                <input type="checkbox" id="audioDfplayer" onchange="onAudioModeChange()" checked> DFPlayer
            </label>
            <span id="audioStatus" class="audio-status" onclick="unlockAdminAudio()">🔇</span>
            <span id="wsStatus" class="ws-status ws-disconnected">切断中</span>
        </div>
    </div>

    <div class="controls">
        <button type="button" class="btn-jingle" onclick="sendJingle()">JINGLE (出題)</button>
        <button type="button" class="btn-countdown" onclick="sendCountdown()">COUNTDOWN (10秒)</button>
        <button type="button" class="btn-arm" onclick="sendArm()">ARM (受付開始)</button>
        <button type="button" class="btn-stop" onclick="sendStop()">STOP (受付停止)</button>
        <button type="button" class="btn-reset" onclick="showResetDialog()">RESET</button>
    </div>
    <div class="controls controls-judge">
        <button type="button" class="btn-correct" id="btnCorrect" onclick="sendJudge('correct')" disabled>正解</button>
        <button type="button" class="btn-incorrect" id="btnIncorrect" onclick="sendJudge('incorrect')" disabled>不正解</button>
    </div>

    <div class="press-order">
        <h3>押下順序</h3>
        <div class="press-list" id="pressOrder">
            <span class="press-empty">待機中...</span>
        </div>
    </div>

    <table class="players-table">
        <thead>
            <tr><th>#</th><th>色</th><th>名前</th><th>スコア</th><th>状態</th><th id="batchColHeader" class="hidden">判定</th></tr>
        </thead>
        <tbody id="playerRows"></tbody>
    </table>

    <div class="settings">
        <h3>設定</h3>
        <div class="settings-grid">
            <label for="numPlayers">プレイヤー人数:</label>
            <select id="numPlayers" onchange="sendSettings()">
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8" selected>8</option>
            </select>
            <label for="pointsCorrect">正解ポイント:</label>
            <input type="number" id="pointsCorrect" value="10" onchange="sendSettings()">
            <label for="pointsIncorrect">不正解ポイント:</label>
            <input type="number" id="pointsIncorrect" value="-5" onchange="sendSettings()">
            <label>オプション:</label>
            <div class="options-list">
                <label class="option-label">
                    不正解時:
                    <select id="reviveMode" onchange="sendSettings()" class="penalty-select">
                        <option value="none">復活なし</option>
                        <option value="immediate">即座に復活</option>
                        <option value="next_answer">次の回答まで休み</option>
                        <option value="next_wrong">次の誤答まで休み</option>
                    </select>
                </label>
                <label class="option-label">
                    同時受付数:
                    <input type="number" id="maxAccepts" min="0" max="8" value="0" onchange="sendSettings()" class="max-accepts-input">
                    <span class="hint-text">0=無制限</span>
                </label>
                <label class="option-label">
                    <input type="checkbox" id="multiCorrect" onchange="onMultiCorrectToggle()" class="option-check">
                    複数正解モード（一問多答）
                </label>
                <label class="option-label" id="maxCorrectRow">
                    正解最大数:
                    <input type="number" id="maxCorrect" min="2" max="8" value="3" onchange="sendSettings()" class="max-accepts-input">
                    <span class="hint-text">N人正解するまで受付継続</span>
                </label>
                <label class="option-label">
                    <input type="checkbox" id="jingleAutoArm" onchange="sendSettings()" class="option-check">
                    ジングル再生時に自動で受付開始する
                </label>
                <label class="option-label">
                    <input type="checkbox" id="countdownAutoStop" onchange="sendSettings()" class="option-check">
                    カウントダウン終了時に自動で受付停止する
                </label>
                <label class="option-label">
                    誤答時
                    <select id="penaltyRounds" onchange="sendSettings()" class="penalty-select">
                        <option value="0">ペナルティなし</option>
                        <option value="1">1問休み</option>
                        <option value="2">2問休み</option>
                        <option value="3">3問休み</option>
                        <option value="5">5問休み</option>
                    </select>
                </label>
                <label class="option-label">
                    <input type="checkbox" id="batchMode" onchange="sendSettings()" class="option-check">
                    一括判定モード（書き問題用）
                </label>
                <div id="batchSettings" class="batch-settings hidden">
                    <label class="option-label batch-label">
                        <input type="checkbox" id="batchUseOrder" onchange="sendSettings()" class="option-check-sm">
                        着順ポイントを使用
                    </label>
                    <div id="batchOrderSettings" class="batch-order-settings hidden">
                        <div class="batch-label-dim">着順ポイント:</div>
                        <div class="batch-points-container" id="batchPointsContainer"></div>
                        <div class="batch-extra-row">
                            <label class="batch-label-dim" for="batchIncorrect">不正解:</label>
                            <input type="number" id="batchIncorrect" value="-5" onchange="sendSettings()" class="batch-rank-input">
                            <label class="batch-label-dim" for="batchNoanswer">無回答:</label>
                            <input type="number" id="batchNoanswer" value="0" onchange="sendSettings()" class="batch-rank-input">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="settings settings-space">
        <h3>回答履歴</h3>
        <div class="history-scroll">
            <table class="history-table" id="historyTable">
                <thead id="historyHead"></thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

    <div class="settings settings-space">
        <h3>音源管理</h3>
        <div class="settings-grid">
            <label for="soundTarget">対象:</label>
            <select id="soundTarget">
                <option value="p1">プレイヤー1</option>
                <option value="p2">プレイヤー2</option>
                <option value="p3">プレイヤー3</option>
                <option value="p4">プレイヤー4</option>
                <option value="p5">プレイヤー5</option>
                <option value="p6">プレイヤー6</option>
                <option value="p7">プレイヤー7</option>
                <option value="p8">プレイヤー8</option>
                <option value="correct">正解</option>
                <option value="incorrect">不正解</option>
                <option value="jingle">ジングル</option>
                <option value="countdown">カウントダウンBGM</option>
                <option value="countdown_end">カウントダウン終了</option>
                <option value="batch_correct">一括判定</option>
            </select>
            <label>ファイル:</label>
            <div class="sound-file-row">
                <input type="file" id="soundFile" accept="audio/*" class="hidden" onchange="onFileSelected()">
                <button type="button" onclick="document.getElementById('soundFile').click()" class="btn-sound btn-sound-select">ファイルを選択</button>
                <span id="fileName" class="sound-file-name">未選択</span>
                <button type="button" onclick="uploadSound()" class="btn-sound btn-sound-upload">アップロード</button>
                <span id="uploadStatus" class="sound-upload-status"></span>
            </div>
        </div>
    </div>

    <div id="resetDialog" class="reset-dialog">
        <div class="reset-dialog-body">
            <h3>RESET</h3>
            <div class="reset-dialog-list">
                <button type="button" class="reset-btn reset-btn-idle" onclick="doReset()">受付停止のみ (IDLE に戻す)</button>
                <button type="button" class="reset-btn reset-btn-penalty" onclick="doResetPenalty()">ペナルティ一括解除</button>
                <button type="button" class="reset-btn reset-btn-score" onclick="doResetScore()">スコアリセット (全員0点)</button>
                <div class="round-control">
                    <label for="roundInput" class="round-control-label">問題番号</label>
                    <div class="round-control-group">
                        <button type="button" onclick="adjustRound(-1)" class="round-control-btn">-</button>
                        <input type="number" id="roundInput" min="0" class="round-control-input" onchange="setRound(parseInt(this.value)||0)">
                        <button type="button" onclick="adjustRound(1)" class="round-control-btn">+</button>
                    </div>
                </div>
                <button type="button" class="reset-btn reset-btn-all" onclick="doResetAll()">全リセット (スコア + ペナルティ + 問題番号)</button>
                <button type="button" class="reset-btn-cancel" onclick="hideResetDialog()">キャンセル</button>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
