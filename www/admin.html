<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早押しボタン - 管理画面</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; background: #1a1a2e; color: #eee; }
        h1 { text-align: center; margin: 0 0 16px; font-size: 1.4em; }

        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: #16213e; padding: 8px 16px; border-radius: 8px; margin-bottom: 16px;
        }
        .status-indicator { padding: 4px 12px; border-radius: 4px; font-weight: bold; font-size: 0.9em; }
        .status-idle { background: #666; }
        .status-armed { background: #2d6a4f; }
        .status-judging { background: #f4a261; color: #222; }
        .status-showing_result { background: #264653; }
        .ws-status { font-size: 0.8em; }
        .ws-connected { color: #2d6a4f; }
        .ws-disconnected { color: #e76f51; }

        .controls {
            display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center;
        }
        .controls button {
            padding: 12px 24px; border: none; border-radius: 8px; font-size: 1em;
            cursor: pointer; font-weight: bold; color: #fff;
        }
        .btn-arm { background: #2d6a4f; }
        .btn-jingle { background: #7209b7; }
        .btn-countdown { background: #d4a017; color: #222; }
        .btn-stop { background: #c9184a; }
        .btn-reset { background: #6c757d; }
        .btn-correct { background: #2196F3; }
        .btn-incorrect { background: #e76f51; }
        .controls button:disabled { opacity: 0.4; cursor: not-allowed; }

        .players-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
        .players-table th { background: #16213e; padding: 8px; text-align: left; font-size: 0.85em; }
        .players-table td { padding: 6px 8px; border-bottom: 1px solid #333; }
        .players-table .player-num {
            width: 30px; height: 30px; border-radius: 50%; display: inline-flex;
            align-items: center; justify-content: center; font-weight: bold; color: #fff; font-size: 0.85em;
        }
        .players-table input[type="text"] {
            background: #16213e; border: 1px solid #444; color: #eee; padding: 4px 8px;
            border-radius: 4px; width: 120px; font-size: 0.9em;
        }
        .score-controls { display: flex; align-items: center; gap: 4px; }
        .score-controls button {
            width: 28px; height: 28px; border: none; border-radius: 4px;
            cursor: pointer; font-weight: bold; font-size: 1em; color: #fff;
        }
        .score-controls .btn-plus { background: #2d6a4f; }
        .score-controls .btn-minus { background: #e76f51; }
        .score-value { min-width: 40px; text-align: center; font-weight: bold; font-size: 1.1em; }
        .player-pressed { background: rgba(45, 106, 79, 0.3) !important; }
        .player-first { background: rgba(33, 150, 243, 0.3) !important; }

        .press-order {
            background: #16213e; padding: 12px; border-radius: 8px; margin-bottom: 16px;
        }
        .press-order h3 { margin: 0 0 8px; font-size: 1em; }
        .press-list { display: flex; gap: 8px; flex-wrap: wrap; min-height: 36px; align-items: center; }
        .press-item {
            padding: 4px 12px; border-radius: 4px; font-weight: bold; font-size: 0.9em;
        }
        .press-first { background: #2196F3; color: #fff; font-size: 1.1em; }
        .press-other { background: #444; color: #ccc; }
        .press-empty { color: #666; font-style: italic; }

        .settings {
            background: #16213e; padding: 12px; border-radius: 8px;
        }
        .settings h3 { margin: 0 0 8px; font-size: 1em; }
        .settings-grid { display: grid; grid-template-columns: auto 1fr; gap: 8px; align-items: center; }
        .settings-grid label { font-size: 0.85em; }
        .settings-grid input {
            background: #1a1a2e; border: 1px solid #444; color: #eee; padding: 4px 8px;
            border-radius: 4px; width: 80px; font-size: 0.9em;
        }
        .history-table { width: 100%; border-collapse: collapse; font-size: 0.8em; }
        .history-table th, .history-table td {
            padding: 4px 6px; border: 1px solid #333; text-align: center; white-space: nowrap;
        }
        .history-table th { background: #16213e; font-weight: bold; }
        .history-table td { background: #1a1a2e; }
        .history-table .h-correct { color: #2d6a4f; font-weight: bold; }
        .history-table .h-incorrect { color: #e76f51; }
        .history-table .h-penalty { color: #666; font-style: italic; }
        .history-table .h-round { background: #16213e; font-weight: bold; color: #888; }
    </style>
</head>
<body>
    <h1>早押しボタン 管理画面 <a href="/setup" style="font-size:0.5em;color:#457b9d">Wi-Fi設定</a></h1>

    <div class="status-bar">
        <div>
            状態: <span id="gameState" class="status-indicator status-idle">IDLE</span>
            <span>問題: <span id="roundNum">0</span>問目</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
            <label style="font-size:0.8em;color:#888">音声再生:</label>
            <select id="audioMode" onchange="onAudioModeChange()" style="background:#1a1a2e;color:#eee;border:1px solid #444;border-radius:4px;padding:2px 4px;font-size:0.8em">
                <option value="display">表示画面</option>
                <option value="admin" selected>管理画面</option>
                <option value="both">両方</option>
            </select>
            <span id="audioStatus" style="font-size:0.75em;cursor:pointer" onclick="unlockAdminAudio()">🔇</span>
            <span id="wsStatus" class="ws-status ws-disconnected">切断中</span>
        </div>
    </div>

    <div class="controls">
        <button class="btn-jingle" onclick="sendJingle()">JINGLE (出題)</button>
        <button class="btn-countdown" onclick="sendCountdown()">COUNTDOWN (10秒)</button>
        <button class="btn-arm" onclick="sendArm()">ARM (受付開始)</button>
        <button class="btn-stop" onclick="sendStop()">STOP (受付停止)</button>
        <button class="btn-reset" onclick="showResetDialog()">RESET</button>
    </div>
    <div class="controls" style="margin-top:4px">
        <button class="btn-correct" id="btnCorrect" onclick="sendJudge('correct')" disabled>正解</button>
        <button class="btn-incorrect" id="btnIncorrect" onclick="sendJudge('incorrect')" disabled>不正解</button>
    </div>

    <div class="press-order">
        <h3>押下順序</h3>
        <div class="press-list" id="pressOrder">
            <span class="press-empty">待機中...</span>
        </div>
    </div>

    <table class="players-table">
        <thead>
            <tr><th>#</th><th>色</th><th>名前</th><th>スコア</th><th>状態</th><th id="batchColHeader" style="display:none">正解</th></tr>
        </thead>
        <tbody id="playerRows"></tbody>
    </table>

    <div class="settings">
        <h3>設定</h3>
        <div class="settings-grid">
            <label>プレイヤー人数:</label>
            <select id="numPlayers" onchange="sendSettings()">
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8" selected>8</option>
            </select>
            <label>正解ポイント:</label>
            <input type="number" id="pointsCorrect" value="10" onchange="sendSettings()">
            <label>不正解ポイント:</label>
            <input type="number" id="pointsIncorrect" value="-5" onchange="sendSettings()">
            <label>オプション:</label>
            <div style="display:flex;flex-direction:column;gap:6px">
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                    <input type="checkbox" id="revival" onchange="sendSettings()" style="width:18px;height:18px;cursor:pointer">
                    不正解時に前の回答者のボタンが復活する
                </label>
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                    <input type="checkbox" id="jingleAutoArm" onchange="sendSettings()" style="width:18px;height:18px;cursor:pointer">
                    ジングル再生時に自動で受付開始する
                </label>
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                    <input type="checkbox" id="countdownAutoStop" onchange="sendSettings()" style="width:18px;height:18px;cursor:pointer">
                    カウントダウン終了時に自動で受付停止する
                </label>
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                    誤答時
                    <select id="penaltyRounds" onchange="sendSettings()" style="background:#1a1a2e;color:#eee;border:1px solid #444;border-radius:4px;padding:2px 4px">
                        <option value="0">ペナルティなし</option>
                        <option value="1">1問休み</option>
                        <option value="2">2問休み</option>
                        <option value="3">3問休み</option>
                        <option value="5">5問休み</option>
                    </select>
                </label>
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                    <input type="checkbox" id="batchMode" onchange="sendSettings()" style="width:18px;height:18px;cursor:pointer">
                    一括判定モード（書き問題用）
                </label>
                <div id="batchSettings" style="display:none;margin-left:24px;margin-top:4px">
                    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.85em">
                        <input type="checkbox" id="batchUseOrder" onchange="sendSettings()" style="width:16px;height:16px;cursor:pointer">
                        着順ポイントを使用
                    </label>
                    <div id="batchOrderSettings" style="display:none;margin-left:22px;margin-top:2px">
                        <label style="display:flex;align-items:center;gap:6px;font-size:0.85em;color:#888">
                            着順ポイント:
                            <input type="text" id="batchPoints" value="10,8,6,4,3,2,1,1" onchange="sendSettings()" style="width:180px;padding:2px 6px;border-radius:4px;border:1px solid #444;background:#1a1a2e;color:#eee;font-size:0.85em">
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="settings" style="margin-top:12px">
        <h3>回答履歴</h3>
        <div style="overflow-x:auto">
            <table class="history-table" id="historyTable">
                <thead id="historyHead"></thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

    <div class="settings" style="margin-top:12px">
        <h3>音源管理</h3>
        <div class="settings-grid">
            <label>対象:</label>
            <select id="soundTarget">
                <option value="p1">プレイヤー1</option>
                <option value="p2">プレイヤー2</option>
                <option value="p3">プレイヤー3</option>
                <option value="p4">プレイヤー4</option>
                <option value="p5">プレイヤー5</option>
                <option value="p6">プレイヤー6</option>
                <option value="p7">プレイヤー7</option>
                <option value="p8">プレイヤー8</option>
                <option value="correct">正解</option>
                <option value="incorrect">不正解</option>
                <option value="jingle">ジングル</option>
                <option value="countdown">カウントダウンBGM</option>
                <option value="countdown_end">カウントダウン終了</option>
                <option value="batch_correct">一括判定</option>
            </select>
            <label>ファイル:</label>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                <input type="file" id="soundFile" accept="audio/*" style="display:none" onchange="onFileSelected()">
                <button onclick="document.getElementById('soundFile').click()" style="padding:4px 12px;background:#444;color:#eee;border:none;border-radius:4px;cursor:pointer;font-size:0.85em">ファイルを選択</button>
                <span id="fileName" style="font-size:0.85em;color:#888">未選択</span>
                <button onclick="uploadSound()" style="padding:4px 12px;background:#2d6a4f;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:0.85em">アップロード</button>
                <span id="uploadStatus" style="font-size:0.8em;color:#888"></span>
            </div>
        </div>
    </div>

    <div id="resetDialog" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center">
        <div style="background:#16213e;border-radius:12px;padding:24px;max-width:360px;width:90%">
            <h3 style="margin:0 0 16px;text-align:center">RESET</h3>
            <div style="display:flex;flex-direction:column;gap:10px">
                <button onclick="doReset()" style="padding:12px;background:#6c757d;color:#fff;border:none;border-radius:8px;font-size:1em;cursor:pointer">受付停止のみ (IDLE に戻す)</button>
                <button onclick="doResetPenalty()" style="padding:12px;background:#f4a261;color:#222;border:none;border-radius:8px;font-size:1em;cursor:pointer">ペナルティ一括解除</button>
                <button onclick="doResetScore()" style="padding:12px;background:#e76f51;color:#fff;border:none;border-radius:8px;font-size:1em;cursor:pointer">スコアリセット (全員0点)</button>
                <button onclick="doResetRound()" style="padding:12px;background:#457b9d;color:#fff;border:none;border-radius:8px;font-size:1em;cursor:pointer">問題番号リセット (0問目に戻す)</button>
                <button onclick="doResetAll()" style="padding:12px;background:#c9184a;color:#fff;border:none;border-radius:8px;font-size:1em;cursor:pointer">全リセット (スコア + ペナルティ + 問題番号)</button>
                <button onclick="hideResetDialog()" style="padding:10px;background:#333;color:#888;border:none;border-radius:8px;font-size:0.9em;cursor:pointer;margin-top:4px">キャンセル</button>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
