<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早押しボタン - Wi-Fi設定</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .status {
            margin-bottom: 16px;
        }
        .status-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .status-label { color: var(--color-text-dim); }
        .status-value { font-weight: bold; }
        .mode-sta { color: var(--color-correct); }
        .mode-ap { color: var(--color-warning); }

        .section {
            margin-bottom: 16px;
        }
        .section h2 {
            margin: 0 0 12px; font-size: 1.1em; border-bottom: 1px solid var(--color-border); padding-bottom: 8px;
        }
        .field input { width: 100%; padding: 8px; font-size: 1em; }

        .buttons { display: flex; gap: 8px; margin-top: 16px; }
        .buttons .btn { flex: 1; }

        .message {
            padding: 8px 12px; border-radius: 4px; margin-top: 12px; display: none;
        }
        .message.success { display: block; background: rgba(45, 106, 79, 0.3); color: var(--color-correct); }
        .message.error { display: block; background: rgba(231, 111, 81, 0.3); color: var(--color-incorrect); }

        .nav { text-align: center; margin-top: 16px; }
        .nav a { color: var(--color-info); text-decoration: none; margin: 0 8px; }

        .section-note { font-size: 0.85em; color: var(--color-text-dim); margin: 0 0 8px; }
    </style>
</head>
<body class="page-shell">
    <h1 class="page-title">Wi-Fi 設定</h1>

    <div class="status panel">
        <div class="status-row">
            <span class="status-label">接続モード:</span>
            <span class="status-value" id="wifiMode">---</span>
        </div>
        <div class="status-row">
            <span class="status-label">IPアドレス:</span>
            <span class="status-value" id="currentIp">---</span>
        </div>
    </div>

    <div class="section panel">
        <h2>Wi-Fi 接続先 (STAモード)</h2>
        <div class="field">
            <label>SSID</label>
            <input type="text" id="wifiSsid" placeholder="接続先のSSID">
        </div>
        <div class="field">
            <label>パスワード</label>
            <input type="password" id="wifiPassword" placeholder="パスワード">
        </div>
    </div>

    <div class="section panel">
        <h2>アクセスポイント (APモード)</h2>
        <p class="section-note">Wi-Fi接続できない場合に自動的にAPモードで起動します</p>
        <div class="field">
            <label>AP SSID</label>
            <input type="text" id="apSsid" placeholder="HayaoshiButton">
        </div>
        <div class="field">
            <label>AP パスワード (8文字以上)</label>
            <input type="text" id="apPassword" placeholder="hayaoshi1234">
        </div>
    </div>

    <div id="msg" class="message"></div>

    <div class="buttons">
        <button type="button" class="btn btn-success" onclick="saveConfig()">設定を保存</button>
        <button type="button" class="btn btn-danger" onclick="reboot()">再起動</button>
    </div>

    <div class="nav">
        <a href="/admin">管理画面へ</a>
        <a href="/">表示画面へ</a>
    </div>

    <script>
    async function loadConfig() {
        try {
            const res = await fetch("/api/config");
            const cfg = await res.json();
            document.getElementById("wifiSsid").value = cfg.wifi_ssid || "";
            document.getElementById("apSsid").value = cfg.ap_ssid || "HayaoshiButton";
            document.getElementById("apPassword").value = cfg.ap_password || "hayaoshi1234";

            const modeEl = document.getElementById("wifiMode");
            if (cfg.wifi_mode === "sta") {
                modeEl.textContent = "STA (既存Wi-Fiに接続中)";
                modeEl.className = "status-value mode-sta";
            } else {
                modeEl.textContent = "AP (アクセスポイントモード)";
                modeEl.className = "status-value mode-ap";
            }
            document.getElementById("currentIp").textContent = cfg.ip;
        } catch (e) {
            showMsg("設定の読み込みに失敗しました", "error");
        }
    }

    async function saveConfig() {
        const body = {
            wifi_ssid: document.getElementById("wifiSsid").value,
            wifi_password: document.getElementById("wifiPassword").value,
            ap_ssid: document.getElementById("apSsid").value,
            ap_password: document.getElementById("apPassword").value,
        };
        // Don't send empty password (keep existing)
        if (!body.wifi_password) delete body.wifi_password;

        try {
            const res = await fetch("/api/config", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(body),
            });
            const result = await res.json();
            if (result.status === "ok") {
                showMsg("保存しました。反映するには再起動してください。", "success");
            } else {
                showMsg(result.message, "error");
            }
        } catch (e) {
            showMsg("保存に失敗しました", "error");
        }
    }

    async function reboot() {
        if (!confirm("再起動しますか？")) return;
        try {
            await fetch("/api/reboot", {method: "POST"});
        } catch (e) {}
        showMsg("再起動中... 数秒後に再接続してください。", "success");
    }

    function showMsg(text, type) {
        const el = document.getElementById("msg");
        el.textContent = text;
        el.className = "message " + type;
    }

    loadConfig();
    </script>
</body>
</html>
