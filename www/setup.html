<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早押しボタン - Wi-Fi設定</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; background: #1a1a2e; color: #eee; }
        h1 { text-align: center; margin: 0 0 16px; font-size: 1.4em; }

        .status {
            background: #16213e; padding: 12px; border-radius: 8px; margin-bottom: 16px;
        }
        .status-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .status-label { color: #888; }
        .status-value { font-weight: bold; }
        .mode-sta { color: #2d6a4f; }
        .mode-ap { color: #f4a261; }

        .section {
            background: #16213e; padding: 16px; border-radius: 8px; margin-bottom: 16px;
        }
        .section h2 { margin: 0 0 12px; font-size: 1.1em; border-bottom: 1px solid #333; padding-bottom: 8px; }

        .field { margin-bottom: 12px; }
        .field label { display: block; font-size: 0.85em; color: #888; margin-bottom: 4px; }
        .field input {
            width: 100%; box-sizing: border-box; padding: 8px; border-radius: 4px;
            border: 1px solid #444; background: #1a1a2e; color: #eee; font-size: 1em;
        }

        .buttons { display: flex; gap: 8px; margin-top: 16px; }
        .buttons button {
            flex: 1; padding: 12px; border: none; border-radius: 8px;
            font-size: 1em; font-weight: bold; cursor: pointer; color: #fff;
        }
        .btn-save { background: #2d6a4f; }
        .btn-reboot { background: #e76f51; }
        .btn-save:disabled, .btn-reboot:disabled { opacity: 0.4; cursor: not-allowed; }

        .message {
            padding: 8px 12px; border-radius: 4px; margin-top: 12px; display: none;
        }
        .message.success { display: block; background: rgba(45, 106, 79, 0.3); color: #2d6a4f; }
        .message.error { display: block; background: rgba(231, 111, 81, 0.3); color: #e76f51; }

        .nav { text-align: center; margin-top: 16px; }
        .nav a { color: #457b9d; text-decoration: none; margin: 0 8px; }

        .section-note { font-size: 0.85em; color: #888; margin: 0 0 8px; }
    </style>
</head>
<body>
    <h1>Wi-Fi 設定</h1>

    <div class="status">
        <div class="status-row">
            <span class="status-label">接続モード:</span>
            <span class="status-value" id="wifiMode">---</span>
        </div>
        <div class="status-row">
            <span class="status-label">IPアドレス:</span>
            <span class="status-value" id="currentIp">---</span>
        </div>
    </div>

    <div class="section">
        <h2>Wi-Fi 接続先 (STAモード)</h2>
        <div class="field">
            <label>SSID</label>
            <input type="text" id="wifiSsid" placeholder="接続先のSSID">
        </div>
        <div class="field">
            <label>パスワード</label>
            <input type="password" id="wifiPassword" placeholder="パスワード">
        </div>
    </div>

    <div class="section">
        <h2>アクセスポイント (APモード)</h2>
        <p class="section-note">Wi-Fi接続できない場合に自動的にAPモードで起動します</p>
        <div class="field">
            <label>AP SSID</label>
            <input type="text" id="apSsid" placeholder="HayaoshiButton">
        </div>
        <div class="field">
            <label>AP パスワード (8文字以上)</label>
            <input type="text" id="apPassword" placeholder="hayaoshi1234">
        </div>
    </div>

    <div id="msg" class="message"></div>

    <div class="buttons">
        <button type="button" class="btn-save" onclick="saveConfig()">設定を保存</button>
        <button type="button" class="btn-reboot" onclick="reboot()">再起動</button>
    </div>

    <div class="nav">
        <a href="/admin">管理画面へ</a>
        <a href="/">表示画面へ</a>
    </div>

    <script>
    async function loadConfig() {
        try {
            const res = await fetch("/api/config");
            const cfg = await res.json();
            document.getElementById("wifiSsid").value = cfg.wifi_ssid || "";
            document.getElementById("apSsid").value = cfg.ap_ssid || "HayaoshiButton";
            document.getElementById("apPassword").value = cfg.ap_password || "hayaoshi1234";

            const modeEl = document.getElementById("wifiMode");
            if (cfg.wifi_mode === "sta") {
                modeEl.textContent = "STA (既存Wi-Fiに接続中)";
                modeEl.className = "status-value mode-sta";
            } else {
                modeEl.textContent = "AP (アクセスポイントモード)";
                modeEl.className = "status-value mode-ap";
            }
            document.getElementById("currentIp").textContent = cfg.ip;
        } catch (e) {
            showMsg("設定の読み込みに失敗しました", "error");
        }
    }

    async function saveConfig() {
        const body = {
            wifi_ssid: document.getElementById("wifiSsid").value,
            wifi_password: document.getElementById("wifiPassword").value,
            ap_ssid: document.getElementById("apSsid").value,
            ap_password: document.getElementById("apPassword").value,
        };
        // Don't send empty password (keep existing)
        if (!body.wifi_password) delete body.wifi_password;

        try {
            const res = await fetch("/api/config", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(body),
            });
            const result = await res.json();
            if (result.status === "ok") {
                showMsg("保存しました。反映するには再起動してください。", "success");
            } else {
                showMsg(result.message, "error");
            }
        } catch (e) {
            showMsg("保存に失敗しました", "error");
        }
    }

    async function reboot() {
        if (!confirm("再起動しますか？")) return;
        try {
            await fetch("/api/reboot", {method: "POST"});
        } catch (e) {}
        showMsg("再起動中... 数秒後に再接続してください。", "success");
    }

    function showMsg(text, type) {
        const el = document.getElementById("msg");
        el.textContent = text;
        el.className = "message " + type;
    }

    loadConfig();
    </script>
</body>
</html>
